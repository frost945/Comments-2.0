<div class="comment-card">

  <div class="comment-header">
    <span class="comment-username">
      {{ comment().userName || 'Неизвестный пользователь' }}
    </span>

    <span class="comment-date">
      {{ comment().createdAt }}
    </span>

      @if (showReplyButton()){
         <button class="replies-btn"
          (click)="openReplies()">
            <span class="replies-content">

              <svg aria-label="Комментировать" role="img" viewBox="0 0 24 24">
                <title>Комментировать</title><path clip-rule="evenodd"
                  d="M12 3C7.02944 3 3 7.02944 3 12C3 16.9706 7.02944 21 12 21C13.414 21 14.7492 20.6747 15.9373 20.0956C16.1277 20.0028 16.3428
                  19.9728 16.5514 20.0101L20.7565 20.7619L19.9927 16.5927C19.954 16.3815 19.9843 16.1633 20.0792 15.9707C20.6685 14.7742 21 13.4273
                  21 12C21 7.02944 16.9706 3 12 3ZM1 12C1 5.92486 5.92488 1 12 1C18.0752 1 23 5.92488 23 12C23 13.6205 22.649 15.1615 22.018 16.549L22.9836
                  21.8198C23.0427 22.1423 22.94 22.4733 22.7086 22.7056C22.4773 22.938 22.1468 23.0421 21.824 22.9844L16.512 22.0348C15.1341 22.6553 13.6061
                    23 12 23C5.92488 23 1 18.0752 1 12Z" fill="currentColor" fill-rule="evenodd"></path>
              </svg>
              {{ comment().replyCount > 0 ? comment().replyCount : '' }}
            </span>
        </button>
      }

  </div>

  <p class="comment-text"
    [innerHTML]="sanitizedText">
  </p>

  @if (comment().imagePreviewUrl) {
    <a
      class="image-link"
      [href]="comment().imageOriginalUrl"
      appLightbox
    >
      <img
        [src]="comment().imagePreviewUrl"
        class="comment-image"
        loading="lazy"
      />
    </a>
  }
  @if (comment().textFileId){
    <div>
      <button (click)="this.fileDownloadService.downloadFile(comment().textFileId, comment().textFileName  ?? 'file.txt')"
      class="text-file-link"
      >
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
        </svg>
        {{comment().textFileName ?? "file.txt"}}
</button>
    </div>
  }
</div>
