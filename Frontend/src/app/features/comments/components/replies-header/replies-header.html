 <div class="header">
    <div class="panel-control-replies">
        <button class="close-replies" (click)="closeReplies()">
            <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
                <path stroke-width="2" stroke-linecap="round" d="M1 6h10M1 6l4-4M1 6l4 4" />
            </svg>
        </button>
        <span class="replies-title">Ветка</span>
        <button class="btn btn-open-modal" (click)="openModal()">новый ответ</button>
    </div>
</div>

<app-comment-form-modal
  [isOpen]="isModalOpen()"
  (close)="isModalOpen.set(false)"
/>
